<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calculadora</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500&display=swap');

  * {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
  }

  :root {
    --bg: #1c1c1e;
    --btn-dark: #333335;
    --btn-mid: #636366;
    --btn-orange: #ff9f0a;
    --btn-orange-active: #ffcc02;
    --text: #ffffff;
    --display-text: #ffffff;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    position: fixed;
  }

  .app {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
    background: var(--bg);
  }

  /* ── DISPLAY ── */
  .display {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-end;
    padding: 0 28px 20px;
    min-height: 0;
  }

  .display-expr {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-size: clamp(16px, 4vw, 22px);
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
    min-height: 24px;
    text-align: right;
    word-break: break-all;
    line-height: 1.3;
  }

  .display-main {
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-weight: 200;
    color: var(--display-text);
    text-align: right;
    line-height: 1;
    word-break: break-all;
    transition: color 0.2s, transform 0.1s;
    /* Dynamic font size based on length */
    font-size: clamp(48px, 18vw, 96px);
  }
  .display-main.shrink  { font-size: clamp(36px, 13vw, 72px); }
  .display-main.smaller { font-size: clamp(28px, 10vw, 54px); }

  .display-main.magic {
    color: #30d158;
    animation: magicReveal 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes magicReveal {
    0%   { transform: scale(0.75) translateY(10px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* ── KEYPAD ── */
  .keypad {
    flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: clamp(8px, 2vw, 14px);
    padding: 0 clamp(10px, 3vw, 18px) clamp(10px, 3vw, 18px);
    /* Make keypad take up ~65% of screen height */
    height: 62vh;
  }

  .key {
    border-radius: 50%;
    border: none;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
    font-size: clamp(22px, 6vw, 36px);
    font-weight: 400;
    cursor: pointer;
    transition: opacity 0.08s, transform 0.08s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-appearance: none;
    touch-action: manipulation;
  }

  .key:active {
    opacity: 0.6;
    transform: scale(0.94);
  }
  .key.locked {
    /* looks normal but does nothing */
  }

  /* Ripple */
  .key .ripple {
    position: absolute;
    border-radius: 50%;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0.15);
    transform: scale(0);
    animation: ripple 0.35s ease-out;
    pointer-events: none;
  }
  @keyframes ripple { to { transform: scale(2); opacity: 0; } }

  .key-num {
    background: var(--btn-dark);
    color: var(--text);
  }
  .key-func {
    background: var(--btn-mid);
    color: var(--text);
    font-size: clamp(17px, 4.5vw, 28px);
    font-weight: 500;
  }
  .key-op {
    background: var(--btn-orange);
    color: #fff;
    font-size: clamp(26px, 7vw, 42px);
    font-weight: 300;
  }
  .key-op.selected {
    background: #fff;
    color: var(--btn-orange);
  }
  .key-eq {
    background: var(--btn-orange);
    color: #fff;
    font-size: clamp(26px, 7vw, 42px);
    font-weight: 300;
  }
  .key-eq.hold-ready {
    background: #30d158;
  }

  /* Hold progress ring on = */
  .key-eq svg.hold-ring {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    transform: rotate(-90deg);
    pointer-events: none;
  }
  .hold-ring-track { fill: none; stroke: rgba(255,255,255,0.15); }
  .hold-ring-fill  { fill: none; stroke: rgba(255,255,255,0.8); stroke-linecap: round; transition: stroke-dashoffset linear; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    align-items: flex-end;
    justify-content: center;
    padding-bottom: var(--safe-bottom);
  }
  .modal-overlay.open {
    display: flex;
    animation: overlayIn 0.25s ease;
  }
  @keyframes overlayIn { from{opacity:0} to{opacity:1} }

  .modal {
    width: 100%;
    max-width: 480px;
    background: #2c2c2e;
    border-radius: 20px 20px 0 0;
    padding: 8px 20px 28px;
    animation: sheetUp 0.3s cubic-bezier(0.32,0.72,0,1);
    position: relative;
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin: 10px auto 20px;
  }

  .modal-title {
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 22px;
  }

  .modal-section {
    background: #3a3a3c;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 12px;
  }

  .modal-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
  }
  .modal-row + .modal-row {
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .modal-label {
    font-family: -apple-system, sans-serif;
    font-size: 16px;
    color: var(--text);
    flex: none;
    min-width: 110px;
  }

  .modal-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--btn-orange);
    font-family: -apple-system, sans-serif;
    font-size: 16px;
    font-weight: 500;
    text-align: right;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  .modal-input::placeholder { color: rgba(255,255,255,0.2); }
  .modal-input::-webkit-inner-spin-button,
  .modal-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .op-selector {
    display: flex; gap: 8px; flex: 1; justify-content: flex-end;
  }
  .op-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid transparent;
    color: rgba(255,255,255,0.5);
    font-family: -apple-system, sans-serif;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .op-btn.active {
    background: rgba(255,159,10,0.2);
    border-color: var(--btn-orange);
    color: var(--btn-orange);
  }

  .modal-status-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; flex-shrink: 0; transition: all 0.3s;
  }
  .dot.ready   { background: var(--btn-orange); box-shadow: 0 0 6px var(--btn-orange); }
  .dot.armed   { background: #ffd60a; box-shadow: 0 0 8px #ffd60a; animation: blink 1s infinite; }
  .dot.done    { background: #30d158; box-shadow: 0 0 8px #30d158; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .dot-label {
    font-family: -apple-system, sans-serif;
    font-size: 14px; color: rgba(255,255,255,0.5); flex: 1;
  }
  .dot-label.armed { color: #ffd60a; }
  .dot-label.done  { color: #30d158; }

  .modal-save-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    background: var(--btn-orange);
    color: #fff;
    font-family: -apple-system, sans-serif;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity 0.1s;
  }
  .modal-save-btn:active { opacity: 0.8; }
</style>
</head>
<body>
<div class="app">

  <!-- DISPLAY -->
  <div class="display">
    <div class="display-expr" id="expr"></div>
    <div class="display-main" id="mainDisplay">0</div>
  </div>

  <!-- KEYPAD -->
  <div class="keypad">
    <!-- Row 1 -->
    <button class="key key-func" id="btnAC" onclick="pressAC()">AC</button>
    <button class="key key-func" onclick="pressSign()">+/−</button>
    <button class="key key-func" onclick="pressPercent()">%</button>
    <button class="key key-op" data-op="÷" onclick="pressOp('÷')">÷</button>
    <!-- Row 2 -->
    <button class="key key-num" onclick="pressNum('7')">7</button>
    <button class="key key-num" onclick="pressNum('8')">8</button>
    <button class="key key-num" onclick="pressNum('9')">9</button>
    <button class="key key-op" data-op="×" onclick="pressOp('×')">×</button>
    <!-- Row 3 -->
    <button class="key key-num" onclick="pressNum('4')">4</button>
    <button class="key key-num" onclick="pressNum('5')">5</button>
    <button class="key key-num" onclick="pressNum('6')">6</button>
    <button class="key key-op" data-op="−" onclick="pressOp('−')">−</button>
    <!-- Row 4 -->
    <button class="key key-num" onclick="pressNum('1')">1</button>
    <button class="key key-num" onclick="pressNum('2')">2</button>
    <button class="key key-num" onclick="pressNum('3')">3</button>
    <button class="key key-op" data-op="+" onclick="pressOp('+')">+</button>
    <!-- Row 5 -->
    <button class="key key-num" style="border-radius:999px; grid-column:span 2; justify-content:flex-start; padding-left:clamp(20px,7vw,38px);" onclick="pressNum('0')">0</button>
    <button class="key key-num" onclick="pressDecimal()">.</button>
    <button class="key key-eq" id="btnEq"
      onmousedown="startHold()" onmouseup="endHold()"
      ontouchstart="startHold(event)" ontouchend="endHold(event)"
      onclick="pressEqual()">
      =
      <svg class="hold-ring" id="holdRingSvg" viewBox="0 0 100 100" style="display:none">
        <circle class="hold-ring-track" cx="50" cy="50" r="46" stroke-width="5"/>
        <circle class="hold-ring-fill" id="holdRingFill" cx="50" cy="50" r="46" stroke-width="5"
          stroke-dasharray="289" stroke-dashoffset="289"/>
      </svg>
    </button>
  </div>
</div>

<!-- MODAL SECRETO (bottom sheet) -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Configuración</div>

    <div class="modal-section">
      <div class="modal-row">
        <span class="modal-label">Número forzado</span>
        <input class="modal-input" id="forcedNumber" type="number" inputmode="numeric" placeholder="ej: 520">
      </div>
      <div class="modal-row">
        <span class="modal-label">Veces trigger</span>
        <input class="modal-input" id="triggerCount" type="number" inputmode="numeric" min="1" max="9" value="1" style="max-width:60px">
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-row">
        <span class="modal-label">Op. activadora</span>
        <div class="op-selector" id="opSelector">
          <button class="op-btn" data-op="+">+</button>
          <button class="op-btn" data-op="−">−</button>
          <button class="op-btn" data-op="×">×</button>
          <button class="op-btn" data-op="÷">÷</button>
        </div>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-status-row">
        <div class="dot" id="statusDot"></div>
        <span class="dot-label" id="statusText">Sin configurar</span>
      </div>
    </div>

    <button class="modal-save-btn" onclick="saveAndClose()">Guardar</button>
  </div>
</div>

<script>
let config = { forcedNum: null, triggerOp: null, triggerCount: 1 };

let state = {
  currentVal: '0', expr: '',
  operator: null, prevVal: null,
  justCalc: false, newInput: false,
  trickArmed: false, trickActivated: false,
  triggerOpCount: 0, magicAdjust: null,
  waitingMagicInput: false, magicInputDone: false,
  activeOp: null,
};

// ── RIPPLE ──
function addRipple(btn) {
  const r = document.createElement('span');
  r.className = 'ripple';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 400);
}
document.querySelectorAll('.key').forEach(k => {
  k.addEventListener('touchstart', () => addRipple(k), { passive: true });
});

// ── % SECRET x3 ──
let percentCount = 0, percentTimer = null;
function pressPercent() {
  percentCount++;
  clearTimeout(percentTimer);
  percentTimer = setTimeout(() => { percentCount = 0; }, 700);
  if (percentCount >= 3) {
    percentCount = 0; clearTimeout(percentTimer);
    openModal(); return;
  }
  const v = getCurrentNum() / 100;
  state.currentVal = String(v);
  updateDisplay(state.currentVal);
}

// ── MODAL ──
function openModal() {
  document.getElementById('forcedNumber').value = config.forcedNum !== null ? config.forcedNum : '';
  document.getElementById('triggerCount').value = config.triggerCount;
  document.querySelectorAll('.op-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.op === config.triggerOp));
  updateModalStatus();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function saveAndClose() {
  const fn = parseFloat(document.getElementById('forcedNumber').value);
  const tc = parseInt(document.getElementById('triggerCount').value);
  const activeOp = document.querySelector('.op-btn.active');
  config.forcedNum    = isNaN(fn) ? null : fn;
  config.triggerOp    = activeOp ? activeOp.dataset.op : null;
  config.triggerCount = isNaN(tc) || tc < 1 ? 1 : tc;
  closeModal();
}

document.getElementById('opSelector').addEventListener('click', e => {
  const btn = e.target.closest('.op-btn');
  if (!btn) return;
  document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateModalStatus();
});
document.getElementById('forcedNumber').addEventListener('input', updateModalStatus);
document.getElementById('triggerCount').addEventListener('input', updateModalStatus);

// Close on tap outside
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Swipe down to close
let touchStartY = 0;
document.getElementById('modalSheet').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('modalSheet').addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 80) closeModal();
}, { passive: true });

function updateModalStatus() {
  const fn  = parseFloat(document.getElementById('forcedNumber').value);
  const op  = document.querySelector('.op-btn.active')?.dataset.op;
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (state.trickActivated) {
    dot.className = 'dot done'; txt.className = 'dot-label done';
    txt.textContent = '✓ Truco activado';
  } else if (state.trickArmed) {
    dot.className = 'dot armed'; txt.className = 'dot-label armed';
    txt.textContent = '⚡ Armado — esperando trigger';
  } else if (!isNaN(fn) && op) {
    dot.className = 'dot ready'; txt.className = 'dot-label';
    txt.textContent = 'Listo · número forzado: ' + fn;
  } else {
    dot.className = 'dot'; txt.className = 'dot-label';
    txt.textContent = 'Sin configurar';
  }
}

// ── DISPLAY ──
function updateDisplay(val, magic = false) {
  const el = document.getElementById('mainDisplay');
  let display = val;
  if (!isNaN(parseFloat(val)) && val !== '') {
    let num = parseFloat(val);
    if (Number.isInteger(num) && !String(val).includes('.')) {
      display = num.toLocaleString('es-CO');
    } else { display = val; }
  }
  const str = display === '' ? '0' : display;
  el.textContent = str;
  // Dynamic font size
  el.className = 'display-main' + (magic ? ' magic' : '');
  const len = str.replace(/[.,]/g,'').length;
  if (len > 9)      el.classList.add('smaller');
  else if (len > 6) el.classList.add('shrink');
  document.getElementById('btnAC').textContent = (str !== '0') ? 'C' : 'AC';
}
function updateExpr(txt) { document.getElementById('expr').textContent = txt; }

// ── OP HIGHLIGHT ──
function setActiveOp(op) {
  state.activeOp = op;
  document.querySelectorAll('.key-op').forEach(k => {
    k.classList.toggle('selected', op && k.dataset.op === op);
  });
}

// ── LOGIC ──
function getCurrentNum() { return parseFloat(state.currentVal.replace(/[.,]/g,'').replace(/\s/g,'')) || 0; }

function pressNum(n) {
  setActiveOp(null);
  if (state.trickActivated) {
    // Any number press reveals the auto-adjust
    state.currentVal = String(state.magicAdjust);
    updateDisplay(state.currentVal);
    updateExpr('');
    return;
  }
  if (state.justCalc || state.newInput) {
    state.currentVal = n; state.justCalc = false; state.newInput = false;
  } else {
    if (state.currentVal.replace('.','').replace('-','').length >= 9) return;
    state.currentVal = state.currentVal === '0' ? n : state.currentVal + n;
  }
  updateDisplay(state.currentVal);
}

function pressDecimal() {
  setActiveOp(null);
  if (state.justCalc || state.newInput) {
    state.currentVal = '0.'; state.justCalc = false; state.newInput = false;
  } else if (!state.currentVal.includes('.')) {
    state.currentVal += '.';
  }
  updateDisplay(state.currentVal);
}

function pressOp(op) {
  // Check trigger
  if (config.forcedNum !== null && config.triggerOp && op === config.triggerOp && !state.trickActivated) {
    if (!state.trickArmed) {
      state.trickArmed = true; state.triggerOpCount = 1;
    } else {
      state.triggerOpCount++;
    }
    if (state.triggerOpCount >= config.triggerCount) { activateTrick(); return; }
  }
  if (state.prevVal !== null && !state.newInput) {
    const result = calculate(state.prevVal, getCurrentNum(), state.operator);
    state.currentVal = String(result); state.prevVal = result;
    updateDisplay(state.currentVal);
  } else {
    state.prevVal = getCurrentNum();
  }
  state.operator = op; state.newInput = true;
  updateExpr(state.currentVal + ' ' + op);
  setActiveOp(op);
}

function lockKeys() {
  document.querySelectorAll('.key:not(#btnEq)').forEach(k => k.classList.add('locked'));
}
function unlockKeys() {
  document.querySelectorAll('.key').forEach(k => k.classList.remove('locked'));
}

function activateTrick() {
  const cur = getCurrentNum();
  state.trickActivated = true; state.trickArmed = false;
  state.magicAdjust = config.forcedNum - cur;
  state.waitingMagicInput = false; state.magicInputDone = true;
  state.operator = '+'; state.prevVal = cur; state.newInput = true;
  // Display stays as-is
  setActiveOp(null);
  lockKeys();
  // = button stays its normal color
}

function pressEqual() {
  setActiveOp(null);
  if (state.trickActivated) {
    // Just show current display normally — real reveal is on hold
    return;
  }
  if (state.prevVal !== null && state.operator) {
    const result = calculate(state.prevVal, getCurrentNum(), state.operator);
    updateExpr(state.currentVal + ' =');
    state.currentVal = String(result); updateDisplay(state.currentVal);
    state.prevVal = null; state.operator = null;
    state.justCalc = true; state.newInput = false;
  }
}

function pressEqualHold() {
  if (!state.trickActivated) return;
  updateDisplay(String(config.forcedNum), true);
  updateExpr('= ' + config.forcedNum);
  state.trickActivated = false; state.trickArmed = false;
  state.triggerOpCount = 0; state.magicAdjust = null;
  state.waitingMagicInput = false; state.magicInputDone = false;
  state.currentVal = String(config.forcedNum);
  state.prevVal = null; state.operator = null;
  document.getElementById('holdRingSvg').style.display = 'none';
  unlockKeys();
}

function pressAC() {
  setActiveOp(null);
  state = {
    currentVal: '0', expr: '', operator: null, prevVal: null,
    justCalc: false, newInput: false, trickArmed: false, trickActivated: false,
    triggerOpCount: 0, magicAdjust: null, waitingMagicInput: false, magicInputDone: false,
    activeOp: null,
  };
  updateDisplay('0'); updateExpr('');
  document.getElementById('holdRingSvg').style.display = 'none';
  unlockKeys();
}

function pressSign() {
  if (state.currentVal === '0') return;
  state.currentVal = state.currentVal.startsWith('-') ? state.currentVal.slice(1) : '-' + state.currentVal;
  updateDisplay(state.currentVal);
}

function calculate(a, b, op) {
  a = parseFloat(a); b = parseFloat(b);
  let r;
  if (op === '+') r = a + b;
  else if (op === '−') r = a - b;
  else if (op === '×') r = a * b;
  else if (op === '÷') r = b === 0 ? 'Error' : a / b;
  else r = b;
  return typeof r === 'number' ? Math.round(r * 1e10) / 1e10 : r;
}

// ── HOLD = (ring animation) ──
let holdTimer = null;
const holdDuration = 1800;

function startHold(e) {
  if (e && e.cancelable) e.preventDefault();
  if (!state.trickActivated) return;
  const svg  = document.getElementById('holdRingSvg');
  const fill = document.getElementById('holdRingFill');
  const circ = 2 * Math.PI * 46; // ~289
  svg.style.display = 'block';
  fill.style.transition = 'none';
  fill.style.strokeDashoffset = circ;
  requestAnimationFrame(() => {
    fill.style.transition = `stroke-dashoffset ${holdDuration}ms linear`;
    fill.style.strokeDashoffset = 0;
  });
  holdTimer = setTimeout(() => {
    pressEqualHold();
  }, holdDuration);
}

function endHold(e) {
  if (holdTimer) {
    clearTimeout(holdTimer); holdTimer = null;
    const svg  = document.getElementById('holdRingSvg');
    const fill = document.getElementById('holdRingFill');
    fill.style.transition = 'stroke-dashoffset 0.3s ease';
    fill.style.strokeDashoffset = 289;
    setTimeout(() => { svg.style.display = 'none'; }, 300);
  }
}
</script>
</body>
